<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 540" font-family="-apple-system, system-ui, Segoe UI, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a73e8"/>
    </marker>
    <style>
      .box { fill: #ffffff; stroke: #1a73e8; stroke-width: 1.6; rx: 12; ry: 12; }
      .box-alt { fill: #f5faff; stroke: #0b3d91; stroke-width: 1.6; rx: 12; ry: 12; }
      .group { fill: rgba(26,115,232,0.05); stroke: rgba(26,115,232,0.35); stroke-dasharray: 4 4; rx: 16; ry: 16; }
      .title { font-size: 13px; font-weight: 600; fill: #0f172a; }
      .sub { font-size: 11px; fill: #475569; }
      .label { font-size: 11px; font-weight: 600; fill: #1a73e8; letter-spacing: 0.08em; text-transform: uppercase; }
      .edge { stroke: #1a73e8; stroke-width: 1.6; fill: none; }
      .edge-label { font-size: 10px; fill: #1a73e8; }
    </style>
  </defs>

  <text x="490" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">Emotion Vision — System Architecture</text>

  <!-- Client -->
  <rect class="group" x="30" y="60" width="220" height="200"/>
  <text class="label" x="50" y="82">Client</text>
  <rect class="box" x="60" y="100" width="160" height="64"/>
  <text class="title" x="140" y="124" text-anchor="middle">Browser</text>
  <text class="sub" x="140" y="142" text-anchor="middle">React + Vite</text>
  <text class="sub" x="140" y="156" text-anchor="middle">EventSource (SSE)</text>

  <rect class="box-alt" x="60" y="180" width="160" height="60"/>
  <text class="title" x="140" y="204" text-anchor="middle">Vercel CDN</text>
  <text class="sub" x="140" y="222" text-anchor="middle">Static frontend hosting</text>

  <!-- Backend -->
  <rect class="group" x="320" y="60" width="340" height="380"/>
  <text class="label" x="340" y="82">Google Cloud Run · us-central1</text>

  <rect class="box" x="360" y="100" width="260" height="70"/>
  <text class="title" x="490" y="124" text-anchor="middle">FastAPI service</text>
  <text class="sub" x="490" y="142" text-anchor="middle">/infer/image · /infer/video · /events</text>
  <text class="sub" x="490" y="156" text-anchor="middle">CORS · slowapi rate limiting</text>

  <rect class="box" x="360" y="190" width="120" height="70"/>
  <text class="title" x="420" y="214" text-anchor="middle">YOLO</text>
  <text class="sub" x="420" y="232" text-anchor="middle">face detector</text>
  <text class="sub" x="420" y="246" text-anchor="middle">(fine-tuned)</text>

  <rect class="box" x="500" y="190" width="120" height="70"/>
  <text class="title" x="560" y="214" text-anchor="middle">ResNet18</text>
  <text class="sub" x="560" y="232" text-anchor="middle">emotion classifier</text>
  <text class="sub" x="560" y="246" text-anchor="middle">+ logit bias</text>

  <rect class="box" x="360" y="280" width="260" height="60"/>
  <text class="title" x="490" y="304" text-anchor="middle">Video job runner</text>
  <text class="sub" x="490" y="322" text-anchor="middle">Threaded · progress streamed via SSE</text>

  <rect class="box-alt" x="360" y="360" width="260" height="60"/>
  <text class="title" x="490" y="384" text-anchor="middle">Artifact Registry</text>
  <text class="sub" x="490" y="402" text-anchor="middle">Container images (per-commit tag)</text>

  <!-- Storage / infra -->
  <rect class="group" x="730" y="60" width="220" height="380"/>
  <text class="label" x="750" y="82">Storage &amp; IaC</text>

  <rect class="box" x="760" y="100" width="160" height="70"/>
  <text class="title" x="840" y="124" text-anchor="middle">GCS bucket</text>
  <text class="sub" x="840" y="142" text-anchor="middle">Annotated video output</text>
  <text class="sub" x="840" y="156" text-anchor="middle">Signed URLs</text>

  <rect class="box" x="760" y="190" width="160" height="70"/>
  <text class="title" x="840" y="214" text-anchor="middle">Secret Manager</text>
  <text class="sub" x="840" y="232" text-anchor="middle">Runtime config</text>
  <text class="sub" x="840" y="246" text-anchor="middle">CORS allowlist</text>

  <rect class="box-alt" x="760" y="280" width="160" height="70"/>
  <text class="title" x="840" y="304" text-anchor="middle">Terraform</text>
  <text class="sub" x="840" y="322" text-anchor="middle">Provisions all GCP</text>
  <text class="sub" x="840" y="336" text-anchor="middle">resources</text>

  <rect class="box-alt" x="760" y="370" width="160" height="60"/>
  <text class="title" x="840" y="394" text-anchor="middle">GitHub Actions</text>
  <text class="sub" x="840" y="412" text-anchor="middle">Build · push · deploy</text>

  <!-- Edges -->
  <path class="edge" d="M220 132 H360" marker-end="url(#arrow)"/>
  <text class="edge-label" x="290" y="124" text-anchor="middle">HTTPS</text>

  <path class="edge" d="M220 210 H360 V160" marker-end="url(#arrow)"/>
  <text class="edge-label" x="290" y="202" text-anchor="middle">static</text>

  <path class="edge" d="M420 170 V190" marker-end="url(#arrow)"/>
  <path class="edge" d="M560 170 V190" marker-end="url(#arrow)"/>
  <path class="edge" d="M490 260 V280" marker-end="url(#arrow)"/>

  <path class="edge" d="M620 310 H760 V145" marker-end="url(#arrow)"/>
  <text class="edge-label" x="700" y="304" text-anchor="middle">upload result</text>

  <path class="edge" d="M620 135 H720" />
  <path class="edge" d="M720 135 V225 H760" marker-end="url(#arrow)"/>
  <text class="edge-label" x="700" y="128" text-anchor="middle">read secrets</text>

  <path class="edge" d="M840 370 V350" marker-end="url(#arrow)"/>
  <path class="edge" d="M840 280 V260" marker-end="url(#arrow)"/>
  <path class="edge" d="M620 395 H760" marker-end="url(#arrow)"/>
  <text class="edge-label" x="690" y="388" text-anchor="middle">deploy</text>

  <text class="sub" x="490" y="490" text-anchor="middle">Training: PyTorch · YOLOv8 fine-tuning · ResNet18 emotion classifier · scripts in /src</text>
  <text class="sub" x="490" y="508" text-anchor="middle">Local inference modes: mock · local weights · provider</text>
</svg>

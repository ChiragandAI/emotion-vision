services:
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    environment:
      INFERENCE_MODE: local
      ALLOWED_ORIGINS: http://localhost:8080,http://127.0.0.1:8080
    ports:
      - "8000:8000"
    volumes:
      - app_outputs:/app/outputs
      - ./models:/app/models  # Mount local model weights (not baked into image — stored in GCS in production)

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8000
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  app_outputs:
